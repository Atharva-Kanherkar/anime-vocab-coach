<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>AVC track test</title></head>
<body style="background:#000">
<video id="v" width="640" autoplay muted controls>
  <source src="vid.mp4" type="video/mp4">
  <track id="t" kind="subtitles" srclang="ja" src="ja.vtt" default>
</video>
<script>
  const v = document.getElementById("v");
  // ensure the track is active so cuechange fires
  v.addEventListener("loadedmetadata", () => { if (v.textTracks[0]) v.textTracks[0].mode = "hidden"; });
  v.play().catch(()=>{});
  // loop so cues keep firing during the test
  v.addEventListener("ended", () => { v.currentTime = 0; v.play().catch(()=>{}); });
</script>
</body></html>
