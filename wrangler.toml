# Root config for the Cloudflare Git-connected avc-api Worker build.
# The Cloudflare dashboard runs `npx wrangler versions upload` from repo root,
# so keep this in sync with backend/wrangler.toml.
name = "avc-api"
main = "backend/src/index.ts"
compatibility_date = "2026-06-01"

kv_namespaces = [
  { binding = "AVC_KV", id = "8e67f3701aa04195975a583cc59d8425" }
]

[vars]
# Per-tier monthly caps — MUST match backend/wrangler.toml (this file is what
# the Cloudflare git-connected build actually deploys; drift here shipped free
# users 45 listening hours and 5 AI calls while the repo said 8h / 40).
CAP_MINUTES = "480"
PRO_CAP_MINUTES = "1200"
MAX_CAP_MINUTES = "3600"
FREE_AI_CALLS_PER_MONTH = "40"
PRO_AI_CALLS_PER_MONTH = "150"
MAX_AI_CALLS_PER_MONTH = "600"
AI_COST_USD_PER_CALL = "0.002"
PAYMENT_FEE_RATE = "0.05"
PAYMENT_FIXED_FEE_USD = "0.30"
TRANSCRIBE_MODEL = "gpt-4o-mini-transcribe"
GROQ_WHISPER_MODEL = "whisper-large-v3"
DEEPINFRA_WHISPER_MODEL = "openai/whisper-large-v3"
TRANSCRIBE_PROVIDERS = "openai"
TRANSCRIPT_MODEL_VERSION = "1"
PROMO_END_UTC = "2026-08-03T23:59:59.000Z"
