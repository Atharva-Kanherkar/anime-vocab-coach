name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: 68b4f7e6d89fd7ac4cbf3243fe190b5f

jobs:
  deploy-site:
    name: Deploy marketing site (Next.js)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11; web/package-lock.json is a lockfileVersion 3
          # file generated by npm 11 (includes esbuild 0.28.1 openharmony
          # entries). npm 10 (Node 22) rejects it as out of sync, so `npm ci`
          # fails. Keep this aligned with the npm that generates the lockfile.
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Deploy to Cloudflare Workers
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npm ci && npm run deploy

  deploy-api:
    name: Deploy Pro API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          preCommands: npm ci
          command: deploy --config wrangler.toml
