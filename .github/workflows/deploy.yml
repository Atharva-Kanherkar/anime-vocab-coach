name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: 68b4f7e6d89fd7ac4cbf3243fe190b5f

jobs:
  # Full prod-fidelity gate (typecheck, lint, unit tests, e2e, prod builds for
  # all three targets). Nothing deploys unless every check passes (issue #42).
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    permissions:
      contents: read

  deploy-site:
    name: Deploy marketing site (Next.js)
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build extension zip for download
        run: |
          npm ci
          npm run pack
          mkdir -p web/public/downloads
          cp dist/anime-vocab-coach.zip web/public/downloads/animevocab-chrome-extension.zip

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11; web/package-lock.json is a lockfileVersion 3
          # file generated by npm 11 (includes esbuild 0.28.1 openharmony
          # entries). npm 10 (Node 22) rejects it as out of sync, so `npm ci`
          # fails. Keep this aligned with the npm that generates the lockfile.
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Deploy to Cloudflare Workers
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_CLERK_ENABLED: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PROXY_URL: https://animevocab.com/__clerk
          # Use the in-app sign-in/up pages. Without these Clerk redirects
          # unauthenticated /app visitors to the hosted Account Portal at
          # accounts.animevocab.com, which serves a Cloudflare "DNS points to
          # prohibited IP" error (portal domain provisioning is broken).
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /app
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /app
        run: npm ci && npm run deploy

      - name: Notify search engines (IndexNow)
        run: |
          curl -sf -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{"host":"animevocab.com","key":"animevocab-indexnow-key","keyLocation":"https://animevocab.com/animevocab-indexnow-key.txt","urlList":["https://animevocab.com/sitemap.xml","https://animevocab.com/","https://animevocab.com/free-japanese-anime-extension","https://animevocab.com/learn-japanese-with-anime","https://animevocab.com/learn-japanese-crunchyroll","https://animevocab.com/blog","https://animevocab.com/blog/best-apps-learn-japanese-anime-2026","https://animevocab.com/blog/migaku-crunchyroll-alternative-2026","https://animevocab.com/vs-migaku","https://animevocab.com/vs-wordy","https://animevocab.com/learn-japanese-disney-plus","https://animevocab.com/learn-japanese-prime-video"]}'

  deploy-api:
    name: Deploy Pro API
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          preCommands: npm ci
          command: deploy --config wrangler.toml
