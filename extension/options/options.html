<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnimeVocab — Settings</title>
  <link rel="stylesheet" href="options.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("av-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
</head>
<body class="av">
  <div class="shell">
    <header class="av-top">
      <div class="av-brand">
        <span class="av-hanko" aria-hidden>アニ</span>
        <span class="av-title">アニメVocab</span>
      </div>
      <button id="theme-toggle" type="button" class="av-btn av-btn-ghost av-btn-sm av-icon-btn" aria-label="Toggle theme" title="Toggle theme">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden>
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"></path>
        </svg>
      </button>
    </header>

    <p class="av-sub">Local extension settings — stored on this device only.</p>
    <p class="av-saved" id="saved-msg" hidden>Saved</p>

    <section class="av-card">
      <h2 class="av-eyebrow">Study</h2>

      <fieldset class="av-fieldset">
        <legend>Mode</legend>
        <label><input type="radio" name="pauseMode" value="copilot"> Ambient — transparent sidebar</label>
        <label><input type="radio" name="pauseMode" value="pause"> Focus — pauses video</label>
        <label><input type="radio" name="pauseMode" value="off"> Off</label>
      </fieldset>

      <div class="av-grid">
        <label>Cooldown (seconds)
          <input type="number" id="cooldownSec" min="5" max="120">
        </label>
        <label>Max cards per hour
          <input type="number" id="maxCardsPerHour" min="1" max="60">
        </label>
        <label>Target difficulty
          <select id="targetLevel">
            <option value="5">Very common</option>
            <option value="4">Common</option>
            <option value="3">Mid-frequency</option>
            <option value="2">Uncommon</option>
            <option value="1">Rare</option>
          </select>
        </label>
        <label>Auto-advance (seconds)
          <input type="number" id="autoResumeSec" min="0" max="120">
        </label>
      </div>

      <label>Word cards show
        <select id="displayScript">
          <option value="romaji">Romaji first</option>
          <option value="kana">Kana first</option>
          <option value="kanji">Kanji first</option>
        </select>
      </label>

      <label class="av-check"><input type="checkbox" id="autoSpeak"> Speak words aloud on cards</label>

      <fieldset class="av-fieldset">
        <legend>Sites</legend>
        <label class="av-check"><input type="checkbox" id="site-youtube"> YouTube</label>
        <label class="av-check"><input type="checkbox" id="site-netflix"> Netflix</label>
        <label class="av-check"><input type="checkbox" id="site-generic"> Generic HTML5</label>
      </fieldset>
    </section>

    <section class="av-card">
      <h2 class="av-eyebrow">Local listening</h2>
      <p class="av-note">Optional — use your own OpenAI key instead of cloud transcription.</p>
      <label>OpenAI API key
        <input type="password" id="openaiKey" placeholder="sk-…" autocomplete="off">
      </label>
      <label>Transcription model
        <select id="transcribeModel">
          <option value="gpt-4o-mini-transcribe">gpt-4o-mini-transcribe</option>
          <option value="gpt-4o-transcribe">gpt-4o-transcribe</option>
        </select>
      </label>
    </section>

    <section class="av-card av-actions">
      <button type="button" id="export-btn" class="av-btn av-btn-ghost">Export JSON</button>
      <button type="button" id="reset-btn" class="av-btn av-btn-quiet av-danger-text">Reset progress</button>
    </section>
  </div>

  <script src="options.js"></script>
</body>
</html>
