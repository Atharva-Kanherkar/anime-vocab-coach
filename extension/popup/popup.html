<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>AnimeVocab</title>
  <link rel="stylesheet" href="popup.css">
  <script>
    (function () {
      try {
        var t = localStorage.getItem("av-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
</head>
<body class="av">
  <div class="shell">
    <header class="av-header">
      <div class="av-brand">
        <span class="av-hanko" aria-hidden>アニ</span>
        <span class="av-title">アニメVocab</span>
      </div>
      <div class="av-header-actions">
        <button id="theme-toggle" type="button" class="av-btn av-btn-ghost av-btn-sm av-icon-btn" aria-label="Toggle theme" title="Toggle theme">
          <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden>
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"></path>
          </svg>
        </button>
      </div>
    </header>

    <section class="av-account" id="account" aria-live="polite"></section>

    <section class="av-actions">
      <button id="review-due" class="av-btn av-btn-primary av-btn-block" type="button" hidden></button>
      <button id="copilot-btn" type="button" class="av-btn av-btn-ghost av-btn-block">Open Copilot on this tab</button>
      <button id="listen-btn" type="button" class="av-btn av-btn-quiet av-btn-block">Start Listening Mode</button>
      <p class="av-error" id="listen-error" hidden></p>
    </section>

    <section class="av-stamp-rally" id="stamp-rally"></section>

    <footer class="av-footer">
      <a href="#" id="cloud-link">Cloud app</a>
      <span aria-hidden>·</span>
      <a href="#" id="settings-link">Settings</a>
      <span aria-hidden>·</span>
      <a href="#" id="export-link">Export</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
