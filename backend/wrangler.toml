# AnimeVocab Pro backend.
#
# One-time setup:
#   npm install
#   npx wrangler login
#   npx wrangler kv namespace create AVC_KV        # paste the id below
#   npx wrangler secret put OPENAI_API_KEY          # required — batch + Realtime transcription
#   npx wrangler deploy
#
# Optional (only when switching off OpenAI credits — see README "Transcription providers"):
#   npx wrangler secret put GROQ_API_KEY
#   npx wrangler secret put DEEPINFRA_API_KEY
#   # then set TRANSCRIBE_PROVIDERS = "groq,deepinfra,openai" in [vars] below
#
# The deployed URL (https://avc-api.<your-subdomain>.workers.dev) goes into
# src/config.ts in the extension repo root.

name = "avc-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

kv_namespaces = [
  { binding = "AVC_KV", id = "8e67f3701aa04195975a583cc59d8425" }
]

[vars]
CAP_MINUTES = "2700"
FREE_AI_CALLS_PER_MONTH = "5"
PRO_AI_CALLS_PER_MONTH = "300"
AI_COST_USD_PER_CALL = "0.002"
PAYMENT_FEE_RATE = "0.05"
PAYMENT_FIXED_FEE_USD = "0.30"
TRANSCRIBE_MODEL = "gpt-4o-mini-transcribe"
# OPENAI_WHISPER_MODEL is unset so the batch cache-miss path keeps using
# TRANSCRIBE_MODEL (gpt-4o-mini-transcribe). Set it only to override that model.
GROQ_WHISPER_MODEL = "whisper-large-v3"
DEEPINFRA_WHISPER_MODEL = "openai/whisper-large-v3"
# Default: OpenAI only (uses your OpenAI credits). No Groq/DeepInfra keys required.
# When credits run low, run the quality gate (benchmarks/QUALITY_GATE.md), then switch to:
# TRANSCRIBE_PROVIDERS = "groq,deepinfra,openai"
TRANSCRIBE_PROVIDERS = "openai"
TRANSCRIPT_MODEL_VERSION = "1"
PROMO_END_UTC = "2026-08-03T23:59:59.000Z"
